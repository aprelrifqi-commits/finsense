<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login · FinSense SVM</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
    background: linear-gradient(135deg, #2d5a4a 0%, #1e4a3a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-container {
    background: #fffdf9;
    border-radius: 24px;
    padding: 2rem;
    width: 100%;
    max-width: 400px;
    margin: 1rem;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

.logo {
    text-align: center;
    margin-bottom: 1.5rem;
}

.logo-icon {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #2d5a4a, #c9a03d);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 0.8rem;
}

.logo-icon i {
    font-size: 1.8rem;
    color: white;
}

.logo h2 {
    font-size: 1.3rem;
    color: #2d5a4a;
}

.logo h2 span {
    color: #c9a03d;
}

.logo p {
    font-size: 0.7rem;
    color: #7a7a72;
}

.form-group {
    margin-bottom: 1rem;
}

.form-group label {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    color: #2a2a26;
    margin-bottom: 0.3rem;
}

.form-group input {
    width: 100%;
    padding: 0.7rem;
    border: 1px solid #e0d9cf;
    border-radius: 12px;
    font-size: 0.85rem;
    transition: 0.2s;
}

.form-group input:focus {
    outline: none;
    border-color: #c9a03d;
    box-shadow: 0 0 0 2px rgba(201,160,61,0.2);
}

.btn-login {
    width: 100%;
    background: #2d5a4a;
    color: white;
    border: none;
    padding: 0.7rem;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
    margin-top: 0.5rem;
}

.btn-login:hover {
    background: #1e4a3a;
    transform: translateY(-2px);
}

.error-message {
    background: #f8d7da;
    color: #b8734a;
    padding: 0.5rem;
    border-radius: 10px;
    font-size: 0.7rem;
    text-align: center;
    margin-bottom: 1rem;
}

.footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.6rem;
    color: #7a7a72;
}

.footer a {
    color: #2d5a4a;
    text-decoration: none;
}
</style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <div class="logo-icon">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h2>Fin<span>Sense</span> Admin</h2>
        <p>Masuk untuk mengelola konten</p>
    </div>
    
    {% if error %}
    <div class="error-message">
        <i class="bi bi-exclamation-triangle"></i> {{ error }}
    </div>
    {% endif %}
    
    <form method="POST">
        <div class="form-group">
            <label><i class="bi bi-person"></i> Username</label>
            <input type="text" name="username" placeholder="admin" required autofocus>
        </div>
        <div class="form-group">
            <label><i class="bi bi-key"></i> Password</label>
            <input type="password" name="password" placeholder="••••••" required>
        </div>
        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right"></i> Masuk
        </button>
    </form>
    
    <div class="footer">
        <p>Demo: username <strong>admin</strong> | password <strong>admin123</strong></p>
        <p><a href="/">← Kembali ke Beranda</a></p>
    </div>
</div>
</body>
</html>
